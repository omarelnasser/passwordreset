<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verified | StudentsApp</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #F5F7FA;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .icon {
            font-size: 60px;
            color: #007AFF;
            margin-bottom: 20px;
        }
        h1 { color: #1A1A1A; margin-bottom: 10px; font-size: 24px; }
        p { color: #666; line-height: 1.5; margin-bottom: 30px; }
        .button {
            display: inline-block;
            background-color: #007AFF;
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.2s;
        }
        .button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>Email Verified!</h1>
        <p>Thank you for verifying your email. Your account is now fully activated and ready to use. You open IGeni app and login</p>
        
    </div>
</body>
</html>
